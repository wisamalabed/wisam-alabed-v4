name: Deploy Terminal Resume

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2. Calculate page footprint
      - name: Calculate page footprint
        run: |
          HTML_SIZE=$(du -k site/index.html | cut -f1)
          CSS_SIZE=$(du -k site/styles.css | cut -f1)
          TOTAL_SIZE=$((HTML_SIZE + CSS_SIZE))
          echo "HTML_SIZE=$HTML_SIZE" >> $GITHUB_ENV
          echo "CSS_SIZE=$CSS_SIZE" >> $GITHUB_ENV
          echo "TOTAL_SIZE=$TOTAL_SIZE" >> $GITHUB_ENV


      # 3. Set semantic version and deploy timestamp
      - name: Set semantic version
        run: |
          DEPLOY_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          echo "DEPLOY_TIME=$DEPLOY_TIME" >> $GITHUB_ENV

          # Try to get latest tag
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            LATEST_TAG=$(git describe --tags --abbrev=0)
            COMMITS=$(git log $LATEST_TAG..HEAD --pretty=%s)
          else
            echo "No tags found, starting from scratch"
            LATEST_TAG="v1.0.0"
            COMMITS=$(git log --pretty=%s)
          fi

          echo "Latest tag: $LATEST_TAG"

          MAJOR=$(echo $LATEST_TAG | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LATEST_TAG | cut -d. -f2)
          PATCH=$(echo $LATEST_TAG | cut -d. -f3)

          if echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
          elif echo "$COMMITS" | grep -q "^feat:"; then
            MINOR=$((MINOR+1))
            PATCH=0
          elif echo "$COMMITS" | grep -q "^fix:"; then
            PATCH=$((PATCH+1))
          else
            PATCH=$((PATCH+1))
          fi

          VERSION="v$MAJOR.$MINOR.$PATCH"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Next version: $VERSION"

          # Tag repo (safe)
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $VERSION || true
          git push origin $VERSION || true

      # 4. Inject metadata into index.html
      - name: Inject build metadata
        run: |
          ls -l site
          sed -i "s/\[ OK \] version: loading.../[ OK ] version: $VERSION/" site/index.html
          sed -i "s/\[ OK \] last deploy: loading.../[ OK ] last deploy: $DEPLOY_TIME | footprint: ${TOTAL_SIZE}KB/" site/index.html

      # 5. Upload the artifact for GitHub Pages
      - name: Upload Pages Artifact
        id: upload
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/
          
      # 6. List files after upload
      - name: List artifact files
        run: ls -R site

      # 7. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
