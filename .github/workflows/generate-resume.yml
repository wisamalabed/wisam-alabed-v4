name: Generate and Commit PDF Resume

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Download JSON resume from Gist (optional)
      - name: Download resume JSON
        run: |
          curl -L -o resume.json https://gist.githubusercontent.com/wisamalabed/6c826f000b9d865a34c0ba6a4841cdb1/raw/

      # Step 3: Generate PDFs using Devleaps JSON Resume Generator
      - name: Generate PDF Resume
        uses: Devleaps/jsonresume-generator@v1
        with:
          action: "render"
          file: "resume.json"
          theme-name: "jsonresume-theme-sidebar"
          output-type: "pdf"
          theme-local: "false"
      
      - name: Rename Sidebar PDF
        run: mv resume.pdf resume-sidebar.pdf     
        
      - name: Generate PDF - Developer Mono Theme
        uses: Devleaps/jsonresume-generator@v1
        with:
          action: "render"
          file: "resume.json"
          theme-name: "jsonresume-theme-developer-mono"
          output-type: "pdf"
          theme-local: "false"
      
      - name: Rename Developer Mono PDF
        run: mv resume.pdf resume-developer-mono.pdf

      - name: Generate PDF - Asymmetric Timeline Theme
        uses: Devleaps/jsonresume-generator@v1
        with:
          action: "render"
          file: "resume.json"
          theme-name: "jsonresume-theme-asymmetric-timeline"
          output-type: "pdf"
          theme-local: "false"

      - name: Rename Asymmetric Timeline PDF
        run: mv resume.pdf resume-asym-timeline.pdf

      - name: Commit PDFs back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume-*.pdf
          git commit -m "Update generated resumes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}