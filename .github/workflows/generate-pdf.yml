name: Generate Resume PDF

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create fonts folder
        run: mkdir -p fonts

      - name: Download Open Sans zip
        run: |
          curl -L -o fonts/opensans.zip https://github.com/google/fonts/raw/main/apache/opensans/OpenSans%5Bwdth,wght%5D.ttf.zip
          unzip fonts/opensans.zip -d fonts

      - name: Generate PDF
        run: python generate_resume.py

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: resume.pdf