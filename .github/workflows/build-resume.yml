name: Build Resume from JSON

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Check for updates daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Fetch JSON Resume
      id: fetch-json
      run: |
        # Get the raw JSON from your gist
        JSON_URL="https://gist.githubusercontent.com/wisamalabed/6c826f000b9d865a34c0ba6a4841cdb1/raw/"
        echo "Fetching JSON from: $JSON_URL"
        
        # Download the JSON
        curl -s "$JSON_URL" > resume.json
        
        # Create a simple HTML generator
        cat > generate-html.py << 'EOF'
        import json
        import html
        from datetime import datetime
        
        # Load the JSON resume
        with open('resume.json', 'r') as f:
            resume = json.load(f)
        
        # Generate HTML
        html_content = """
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>""" + html.escape(resume['basics']['name']) + """ - Resume</title>
            <style>
                /* Your CSS styles here */
                body { font-family: Arial, sans-serif; margin: 40px; max-width: 800px; margin: 0 auto; }
                .header { background: #2563eb; color: white; padding: 40px 20px; text-align: center; }
                .section { margin-bottom: 30px; }
                .section-title { color: #2563eb; border-bottom: 2px solid #2563eb; padding-bottom: 5px; }
                .experience-item { margin-bottom: 20px; }
                .company { color: #2563eb; font-weight: bold; }
                .date { color: #666; font-size: 0.9em; }
                .highlights { list-style: none; padding-left: 0; }
                .highlights li::before { content: "▸"; color: #2563eb; font-weight: bold; }
                @media (max-width: 768px) { body { margin: 20px; } }
            </style>
        </head>
        <body>
            <div class="header">
                <h1>""" + html.escape(resume['basics']['name']) + """</h1>
                <p>""" + html.escape(resume['basics']['label']) + """</p>
            </div>
            
            <div class="section">
                <h2 class="section-title">Contact</h2>
                <p>strong>Email:</<strong> """ + html.escape(resume['basics']['email']) + """</p>
                <p><strong>Phone:</strong> """ + html.escape(resume['basics']['phone']) + """</p>
                <p><strong>Location:</strong> """ + html.escape(resume['basics']['location']['city']) + """, """ + html.escape(resume['basics']['location']['countryCode']) + """</p>
            </div>
            
            <div class="section">
                <h2 class="section-title">Summary</h2>
                <p>""" + html.escape(resume['basics']['summary']) + """</p>
            </div>
            
            <div class="section">
                <h2 class="section-title">Experience</h2>
        """
        
        # Add work experience
        for job in resume['work']:
            html_content += f"""
                <div class="experience-item">
                    <h3>{html.escape(job['position'])}</h3>
                    <p class="company">{html.escape(job['name'])}</p>
                    <p class="date">{format_date(job['startDate'])} - {format_date(job.get('endDate', 'Present'))}</p>
                    <p>{html.escape(job.get('summary', ''))}</p>
            """
            
            if 'highlights' in job and job['highlights']:
                html_content += "<ul class='highlights'>"
                for highlight in job['highlights']:
                    html_content += f"<li>{html.escape(highlight)}</li>"
                html_content += "</ul>"
            
            html_content += "</div>"
        
        html_content += """
            </div>
            
            <div class="section">
                <h2 class="section-title">Education</h2>
        """
        
        # Add education
        for edu in resume['education']:
            html_content += f"""
                <div class="experience-item">
                    <h3>{html.escape(edu['area'])} - {html.escape(edu['studyType'])}</h3>
                    <p class="company">{html.escape(edu['institution'])}</p>
                    <p class="date">{format_date(edu['startDate'])} - {format_date(edu['endDate'])}</p>
                </div>
            """
        
        html_content += """
            </div>
            
            <div class="section">
                <h2 class="section-title">Skills</h2>
        """
        
        # Add skills
        for skill in resume['skills']:
            html_content += f"""
                <div class="experience-item">
                    <h3>{html.escape(skill['name'])} ({html.escape(skill['level'])})</h3>
                    <p>{', '.join(html.escape(kw) for kw in skill['keywords'])}</p>
                </div>
            """
        
        html_content += """
            </div>
        </body>
        </html>
        """
        
        with open('index.html', 'w') as f:
            f.write(html_content)
        
        def format_date(date_str):
            if date_str == 'Present':
                return date_str
            try:
                date = datetime.strptime(date_str, '%Y-%m-%d')
                return date.strftime('%b %Y')
            except:
                return date_str
        
        EOF
        
        python3 generate-html.py
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: .
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
