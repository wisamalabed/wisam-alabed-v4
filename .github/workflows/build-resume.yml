name: Build Resume (from Gist)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GIST_RAW_URL: https://gist.githubusercontent.com/wisamalabed/6c826f000b9d865a34c0ba6a4841cdb1/raw/f08f6a0483c424f9f69afbab44d24a4234b4fb3d/resume.json
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update -y && sudo apt-get install -y jq gettext-base

      - name: Fetch Gist JSON
        run: curl -fsSL "$GIST_RAW_URL" -o resume.json

      - name: Export simple fields to env file
        run: |
          jq -r '
            .basics.name // "" as $name |
            .basics.label // "" as $label |
            .basics.image // "" as $image |
            .basics.email // "" as $email |
            .basics.phone // "" as $phone |
            .basics.summary // "" as $summary |
            .basics.location.city // "" as $city |
            .basics.location.countryCode // "" as $country |
            .meta.theme // "" as $theme |
            {name:$name,label:$label,image:$image,email:$email,phone:$phone,summary:$summary,city:$city,country:$country,theme:$theme} |
            to_entries[] | "\(.key)=\(.value|@sh)"' resume.json > resume.env
          # remove surrounding single quotes jq added
          sed -E "s/^([^=]+=)'(.*)'$/\1\2/" resume.env > resume.env.tmp && mv resume.env.tmp resume.env

      - name: Render lists to HTML partials
        run: |
          # Work items
          jq -r '
            .work[]? |
            "<div style=\"margin-bottom:12px\"><strong>\(.name|@html) — \(.position|@html)</strong><div class=\"muted\">\(.startDate // "")\(.endDate? | select(.) | " — " + .) • \(.location // "")</div><div style=\"margin-top:6px\">\(.summary|@html)</div>" +
            (if (.highlights | length) > 0 then ("<ul>" + (.highlights[] | "<li>"+@html+ "</li>") + "</ul>") else "" end) + "</div>"' resume.json > work.html || true

          # Education
          jq -r '
            .education[]? |
            "<div style=\"margin-bottom:10px\"><strong>\(.institution|@html)</strong><div class=\"muted\">\(.studyType // "") — \(.area // "") • \(.startDate // "")\(.endDate? | select(.) | " — " + .)</div></div>"' resume.json > education.html || true

          # Skills
          jq -r '
            .skills[]? |
            "<div style=\"margin-bottom:8px\"><strong>\(.name|@html)</strong><div class=\"muted\">\((.keywords // []) | join(", "))</div></div>"' resume.json > skills.html || true

      - name: Prepare template (convert {{var}} -> ${var})
        run: |
          # create working copy
          cp index.html index.template.html
          # convert double-mustache to envsubst style ${var}
          sed -E 's/\{\{\s*basics\.name\s*\}\}/${name}/g;
                  s/\{\{\s*basics\.label\s*\}\}/${label}/g;
                  s/\{\{\s*basics\.image\s*\}\}/${image}/g;
                  s/\{\{\s*basics\.email\s*\}\}/${email}/g;
                  s/\{\{\s*basics\.phone\s*\}\}/${phone}/g;
                  s/\{\{\s*basics\.summary\s*\}\}/${summary}/g;
                  s/\{\{\s*basics\.location\.city\s*\}\}/${city}/g;
                  s/\{\{\s*basics\.location\.countryCode\s*\}\}/${country}/g;
                  s/\{\{\s*meta\.theme\s*\}\}/${theme}/g' index.template.html > index.template2.html

      - name: Inject partial placeholders
        run: |
          # replace your hand-written blocks (e.g., the {{#work}}...{{/work}} area) with unique markers
          sed -E '/\{\{\#work\}\}/,/\{\{\/work\}\}/c\__WORK_HTML__' index.template2.html > index.template3.html
          sed -E '/\{\{\#education\}\}/,/\{\{\/education\}\}/c\__EDU_HTML__' index.template3.html > index.template4.html
          sed -E '/\{\{\#skills\}\}/,/\{\{\/skills\}\}/c\__SKILLS_HTML__' index.template4.html > index.template.final.html

      - name: Render final index.html with envsubst
        env:
          INPUT_TEMPLATE: index.template.final.html
        run: |
          set -o allexport
          . resume.env
          set +o allexport
          WORK_HTML="$(cat work.html 2>/dev/null || true)"
          EDU_HTML="$(cat education.html 2>/dev/null || true)"
          SKILLS_HTML="$(cat skills.html 2>/dev/null || true)"
          # use awk to safely replace markers with partials and run envsubst
          awk -v w="$WORK_HTML" -v e="$EDU_HTML" -v s="$SKILLS_HTML" '{gsub(/__WORK_HTML__/,w); gsub(/__EDU_HTML__/,e); gsub(/__SKILLS_HTML__/,s); print}' "$INPUT_TEMPLATE" > _temp_index.html
          envsubst < _temp_index.html > index.html

      - name: Show generated file snippet
        run: sed -n '1,200p' index.html

      - name: Commit and push (optional)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: build resume from gist" || echo "no changes to commit"
          git push origin HEAD:main || echo "push failed"
