name: Build & Deploy Resume to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    env:
      GIST_RAW_URL: https://gist.githubusercontent.com/wisamalabed/6c826f000b9d865a34c0ba6a4841cdb1/raw/f08f6a0483c424f9f69afbab44d24a4234b4fb3d/resume.json
      OUTPUT_DIR: build
      OUTPUT_FILE: index.html

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Handlebars CLI (for convenience) and jq
        run: |
          npm install -g handlebars-cli@^1.7.0
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Fetch Gist JSON
        run: curl -fsSL "$GIST_RAW_URL" -o resume.json

      - name: Validate resume JSON exists
        run: |
          if [ ! -s resume.json ]; then
            echo "resume.json missing or empty" >&2
            exit 1
          fi

      - name: Create Handlebars partials and template
        run: |
          mkdir -p templates

          cat > templates/work.hbs <<'H'
          {{#if work}}
            {{#each work}}
            <div style="margin-bottom:12px">
              <strong>{{name}} — {{position}}</strong>
              <div class="muted">{{startDate}}{{#if endDate}} — {{endDate}}{{/if}}{{#if location}} • {{location}}{{/if}}</div>
              <div style="margin-top:6px">{{summary}}</div>
              {{#if highlights}}
                <ul>
                  {{#each highlights}}
                    <li>{{this}}</li>
                  {{/each}}
                </ul>
              {{/if}}
            </div>
            {{/each}}
          {{/if}}
          H

          cat > templates/education.hbs <<'H'
          {{#if education}}
            {{#each education}}
            <div style="margin-bottom:10px">
              <strong>{{institution}}</strong>
              <div class="muted">{{studyType}}{{#if area}} — {{area}}{{/if}}{{#if startDate}} • {{startDate}}{{/if}}{{#if endDate}} — {{endDate}}{{/if}}</div>
            </div>
            {{/each}}
          {{/if}}
          H

          cat > templates/skills.hbs <<'H'
          {{#if skills}}
            {{#each skills}}
            <div style="margin-bottom:8px">
              <strong>{{name}}</strong>
              <div class="muted">{{#if keywords}}{{keywords.[0]}}{{#each keywords.[1..]}}{{", "}}{{this}}{{/each}}{{/if}}</div>
            </div>
            {{/each}}
          {{/if}}
          H

          cat > templates/index.hbs <<'H'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>{{basics.name}}</title>
            <link rel="stylesheet" href="styles.css">
          </head>
          <body>
            <header>
              <h1>{{basics.name}} <small>{{basics.label}}</small></h1>
              <div>{{basics.summary}}</div>
              <div class="muted">{{basics.location.city}}{{#if basics.location.countryCode}} • {{basics.location.countryCode}}{{/if}}</div>
            </header>
          
            <main>
              {{> work}}
              {{> education}}
              {{> skills}}
            </main>
          </body>
          </html>
          H

      - name: Render with Handlebars (Node)
        run: |
          cat > render.js <<'JS'
          const fs = require('fs');
          const Handlebars = require('handlebars');
          
          // register partials
          const partials = ['work','education','skills'];
          partials.forEach(p => {
            Handlebars.registerPartial(p, fs.readFileSync(`templates/${p}.hbs`, 'utf8'));
          });
          
          // register helpers if needed (Handlebars escapes by default)
          Handlebars.registerHelper('join', function(arr, sep=', ') {
            if (!Array.isArray(arr)) return '';
            return arr.join(sep);
          });
          
          const resume = JSON.parse(fs.readFileSync('resume.json','utf8'));
          const templateSrc = fs.readFileSync('templates/index.hbs','utf8');
          const template = Handlebars.compile(templateSrc, {noEscape: false});
          const out = template(resume);
          fs.mkdirSync(process.env.OUTPUT_DIR || 'build', {recursive:true});
          fs.writeFileSync(`${process.env.OUTPUT_DIR || 'build'}/${process.env.OUTPUT_FILE || 'index.html'}`, out, 'utf8');
          JS
          node render.js

      - name: Copy static assets
        run: |
          cp -a styles.css "$OUTPUT_DIR/" || true

      - name: List build output
        run: |
          ls -la "$OUTPUT_DIR"
          sed -n '1,120p' "$OUTPUT_DIR/$OUTPUT_FILE" || true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v3.0.2-node.24
