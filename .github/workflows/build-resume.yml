name: Deploy Static Resume

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Fetch Gist Content
      id: fetch-gist
      run: |
        # Get the raw gist content
        GIST_URL="https://gist.githubusercontent.com/wisamalabed/6c826f000b9d865a34c0ba6a4841cdb1/raw/"
        echo "Fetching gist from: $GIST_URL"
        
        # Create a simple script to fetch and update the HTML
        cat > update-resume.py << 'EOF'
        import urllib.request
        import re
        
        gist_url = "https://gist.githubusercontent.com/wisamalabed/6c826f000b9d865a34c0ba6a4841cdb1/raw/"
        
        try:
            with urllib.request.urlopen(gist_url) as response:
                gist_content = response.read().decode('utf-8')
            
            # Extract resume data from gist (customize this based on your gist format)
            # This is a simple example - adjust based on your actual gist structure
            print("Gist content retrieved successfully")
            print(f"Content length: {len(gist_content)} characters")
            
            # Create or update resume HTML with gist data
            # In a real scenario, you'd parse the gist content and insert it into templates
            
        except Exception as e:
            print(f"Error fetching gist: {e}")
            exit(1)
        EOF
        
        python update-resume.py
        
        # Create a simple deployment script
        cat > deploy.sh << 'EOF'
        #!/bin/bash
        echo "Deploying static resume..."
        
        # Copy the static HTML file to deployment directory
        mkdir -p dist
        cp index.html dist/
        
        # Add .nojekyll file for GitHub Pages
        touch dist/.nojekyll
        
        echo "Deployment ready"
        EOF
        
        chmod +x deploy.sh
        ./deploy.sh
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: dist/
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
