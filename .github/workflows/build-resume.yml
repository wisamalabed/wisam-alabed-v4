name: Build & Deploy Resume to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      GIST_RAW_URL: https://gist.githubusercontent.com/wisamalabed/6c826f000b9d865a34c0ba6a4841cdb1/raw/f08f6a0483c424f9f69afbab44d24a4234b4fb3d/resume.json
      OUTPUT_DIR: build
      OUTPUT_FILE: index.html
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update -y && sudo apt-get install -y jq gettext-base

      - name: Fetch Gist JSON
        run: curl -fsSL "$GIST_RAW_URL" -o resume.json

      - name: Export simple fields to env file (safe quoting)
        run: |
          jq -r '
            {
              name: (.basics.name // ""),
              label: (.basics.label // ""),
              image: (.basics.image // ""),
              email: (.basics.email // ""),
              phone: (.basics.phone // ""),
              summary: (.basics.summary // ""),
              city: (.basics.location.city // ""),
              country: (.basics.location.countryCode // ""),
              theme: (.meta.theme // "")
            }
            | to_entries[]
            | "\(.key)=\(.value|@json)"
          ' resume.json > resume.env

      - name: Render lists to HTML partials
        run: |
          jq -r '
            .work[]? |
            "<div style=\"margin-bottom:12px\"><strong>\(.name|@html) — \(.position|@html)</strong><div class=\"muted\">\(.startDate // "")\(.endDate? | select(.) | " — " + .) • \(.location // "")</div><div style=\"margin-top:6px\">\(.summary|@html)</div>" +
            (if (.highlights | length) > 0 then ("<ul>" + (.highlights[] | "<li>"+@html+ "</li>") + "</ul>") else "" end) + "</div>"' resume.json > work.html || true

          jq -r '
            .education[]? |
            "<div style=\"margin-bottom:10px\"><strong>\(.institution|@html)</strong><div class=\"muted\">\(.studyType // "") — \(.area // "") • \(.startDate // "")\(.endDate? | select(.) | " — " + .)</div></div>"' resume.json > education.html || true

          jq -r '
            .skills[]? |
            "<div style=\"margin-bottom:8px\"><strong>\(.name|@html)</strong><div class=\"muted\">\((.keywords // []) | join(", "))</div></div>"' resume.json > skills.html || true

      - name: Prepare template copy and convert placeholders
        run: |
          mkdir -p "$OUTPUT_DIR"
          cp index.html "$OUTPUT_DIR/index.template.html"
          sed -E 's/\{\{\s*basics\.name\s*\}\}/${name}/g;
                  s/\{\{\s*basics\.label\s*\}\}/${label}/g;
                  s/\{\{\s*basics\.image\s*\}\}/${image}/g;
                  s/\{\{\s*basics\.email\s*\}\}/${email}/g;
                  s/\{\{\s*basics\.phone\s*\}\}/${phone}/g;
                  s/\{\{\s*basics\.summary\s*\}\}/${summary}/g;
                  s/\{\{\s*basics\.location\.city\s*\}\}/${city}/g;
                  s/\{\{\s*basics\.location.countryCode\s*\}\}/${country}/g;
                  s/\{\{\s*meta\.theme\s*\}\}/${theme}/g' "$OUTPUT_DIR/index.template.html" > "$OUTPUT_DIR/index.template2.html"

      - name: Replace list blocks with markers
        run: |
          sed -E '/\{\{\#work\}\}/,/\{\{\/work\}\}/c\__WORK_HTML__' "$OUTPUT_DIR/index.template2.html" > "$OUTPUT_DIR/index.template3.html"
          sed -E '/\{\{\#education\}\}/,/\{\{\/education\}\}/c\__EDU_HTML__' "$OUTPUT_DIR/index.template3.html" > "$OUTPUT_DIR/index.template4.html"
          sed -E '/\{\{\#skills\}\}/,/\{\{\/skills\}\}/c\__SKILLS_HTML__' "$OUTPUT_DIR/index.template4.html" > "$OUTPUT_DIR/index.template.final.html"

      - name: Produce final filled HTML (build/index.html)
        run: |
          set -o allexport
          . resume.env
          set +o allexport
          WORK_HTML="$(cat work.html 2>/dev/null || true)"
          EDU_HTML="$(cat education.html 2>/dev/null || true)"
          SKILLS_HTML="$(cat skills.html 2>/dev/null || true)"
          awk -v w="$WORK_HTML" -v e="$EDU_HTML" -v s="$SKILLS_HTML" '{gsub(/__WORK_HTML__/,w); gsub(/__EDU_HTML__/,e); gsub(/__SKILLS_HTML__/,s); print}' "$OUTPUT_DIR/index.template.final.html" > "$OUTPUT_DIR/_temp_index.html"
          envsubst < "$OUTPUT_DIR/_temp_index.html" > "$OUTPUT_DIR/$OUTPUT_FILE"

      - name: Copy static assets (styles.css, images, etc.)
        run: |
          cp -a styles.css "$OUTPUT_DIR/" || true

      - name: List build output
        run: |
          ls -la "$OUTPUT_DIR"
          sed -n '1,120p' "$OUTPUT_DIR/$OUTPUT_FILE"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
